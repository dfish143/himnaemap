//      지도 커스텀 오버레이 추가 html
// |＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿|
// \ (•◡•) /

// places 배열의 각 요소에 대해 커스텀 오버레이를 생성하고 지도에 추가
places.forEach(function (place) {
    // 1. 기본 링크 변수 정의
    var mapUrl = place.content.url;
    var videoOrInstaUrl = place.content.videoUrl || place.content.instarUrl || mapUrl;

    var content = '<div class="overlay_info">';
    
    content += '    <div class="desc" onclick="window.open(\'' + mapUrl + '\', \'_blank\')">';

    content += '        <div class="thum_wrap" onclick="window.open(\'' + videoOrInstaUrl + '\', \'_blank\'); event.stopPropagation();">';
    content += '            <img class="thum_img" src="' + place.content.thumbnail + '">';
    if (place.content.showNewIcon) {
        content += '            <div class="new_icon"><img src="img/icon/new_icon.png"></div>';
    }
    if (place.content.videoUrl) {
        content += '            <div class="play_btn"><img src="img/icon/yt.png"></div>';
    } else if (place.content.instarUrl) {
        content += '            <div class="play_btn"><img src="img/icon/instar_btn.png"></div>';
    }
    content += '        </div>';

    content += '        <div class="info_wrap">';
    content += '            <a class="map_go" href="' + mapUrl + '" target="_blank" onclick="event.stopPropagation();"><strong class="' + place.content.className + '">' + place.content.title + '</strong></a>';
    content += '            <span class="detail">' + place.content.detail + '</span>';
    content += '            <div class="mem_cate_wrap">' + place.content.catetag.map(function (member) {
        return '<span>' + member + '</span>';
    }).join('') + '</div>';
    content += '        </div>';

    content += '        <div class="map_pin_btn" onclick="window.open(\''+ mapUrl +'\', \'_blank\'); event.stopPropagation();">';
    content += '            <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="18" r="18" fill="#FFD4E8"/><path d="M15 6c-3.8 0-7 3.1-7 7 0 5.2 7 11 7 11s7-5.8 7-11c0-3.9-3.2-7-7-7zm0 9.5c-1.4 0-2.5-1.1-2.5-2.5s1.1-2.5 2.5-2.5 2.5 1.1 2.5 2.5-1.1 2.5-2.5 2.5z" fill="#E6307C"/></svg>';
    content += '        </div>';

    content += '    </div>';
    content += '</div>';

    var overlay = new kakao.maps.CustomOverlay({
        position: place.position,
        content: content,
        xAnchor: 0.5,
        yAnchor: 1.1
    });
    overlay.setMap(map);

    overlays.push({
        overlay: overlay,
        catetag: place.content.catetag
    });
});

        // 필터 버튼 클릭 이벤트: 버튼 클릭 시 선택된 필터에 따라 오버레이를 지도에 표시하거나 숨깁니다.
        document.addEventListener('DOMContentLoaded', function () {
            // 모든 버튼을 선택합니다.
            const buttons = document.querySelectorAll('.filter_btn button');

            // 각 버튼에 클릭 이벤트 리스너를 추가합니다.
            buttons.forEach(button => {
                button.addEventListener('click', function () {
                    // 클릭된 버튼의 data-filter 속성 값을 가져옵니다.
                    const filter = this.getAttribute('data-filter');

                    // 모든 버튼에서 active 클래스를 제거합니다.
                    buttons.forEach(btn => btn.classList.remove('active'));

                    // 클릭된 버튼에 active 클래스를 추가합니다.
                    this.classList.add('active');

                    // 필터링 로직
                    overlays.forEach(item => {
                        if (filter === 'ALL' || item.catetag.includes(filter)) {
                            item.overlay.setMap(map); // 필터 조건에 맞는 오버레이를 지도에 표시합니다.
                        } else {
                            item.overlay.setMap(null); // 필터 조건에 맞지 않는 오버레이를 지도에서 숨깁니다.
                        }
                    });
                });
            });
        });
    </script>
</body>

</html>
